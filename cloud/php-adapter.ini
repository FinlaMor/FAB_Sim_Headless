; PHP config for bare `php -S` adapter processes (mirrors adapter/Dockerfile's
; opcache block). opcache + JIT are a real cold-path win for the engine.
; NOTE validate_timestamps=0 => if you EDIT talishar/ or adapter/ code you must
; restart the adapter processes (kill + rerun cloud_collect.sh) for it to load.
opcache.enable=1
opcache.enable_cli=1
opcache.memory_consumption=192
opcache.max_accelerated_files=8000
opcache.validate_timestamps=0
opcache.revalidate_freq=0
opcache.jit=tracing
opcache.jit_buffer_size=64M
